# SearXNG Configuration for ATrips
# Optimized for Vietnam travel search — performance tuned

use_default_settings: true

general:
  debug: false
  instance_name: "ATrips Search"
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "vi"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "02d12f6b3cc059b4dd232be4c664251dba2dcd4d6d74f4162b8c30431ddeafe2"
  limiter: false
  image_proxy: false
  method: "POST"

ui:
  static_use_hash: true
  default_locale: "vi"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: "simple"
  theme_args:
    simple_style: "auto"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  pool_connections: 50
  pool_maxsize: 20
  enable_http2: true

# Tuned engine list — only fast, reliable engines for travel search
engines:
  - name: google
    engine: google
    shortcut: gg
    use_mobile_ui: false
    timeout: 4.0
    weight: 1.2

  - name: bing
    engine: bing
    shortcut: bi
    timeout: 4.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    timeout: 4.0

  - name: brave
    engine: brave
    shortcut: br
    time_range_support: true
    timeout: 4.0

  - name: startpage
    engine: startpage
    shortcut: sp
    timeout: 6.0

enabled_plugins:
  - 'Hash plugin'
  - 'Self Information'
  - 'Tracker URL remover'

# Disable noisy / slow / irrelevant engines
